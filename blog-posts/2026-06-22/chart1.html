<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buying Groups Reporting Unhealthy Conflict</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    margin: 0;
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  .chart-wrap {
    max-width: 560px;
    margin: 40px auto;
    padding: 24px;
    border: 1px solid #E7E5E4;
    border-radius: 8px;
    background: #FFFFFF;
  }
  h2 {
    font-size: 17px;
    color: #0F172A;
    margin: 0 0 4px;
  }
  p.sub {
    font-size: 13px;
    color: #64748B;
    margin: 0 0 16px;
  }
  p.source {
    font-size: 12px;
    color: #94A3B8;
    margin: 16px 0 0;
  }
</style>
</head>
<body>
  <div class="chart-wrap">
    <h2>Most Buying Groups Show Unhealthy Conflict</h2>
    <p class="sub">Share of B2B buying groups, by whether members openly disagreed or were overruled during the decision</p>
    <canvas id="conflictDonut" width="512" height="340"></canvas>
    <p class="source">Source: Gartner, 2025 B2B sales survey of 632 buyers</p>
  </div>

  <script>
    const ctx = document.getElementById('conflictDonut').getContext('2d');
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Showed unhealthy conflict', 'Reached consensus without conflict'],
        datasets: [{
          data: [74, 26],
          backgroundColor: ['#DC2626', '#E2E8F0'],
          borderColor: '#FFFFFF',
          borderWidth: 2
        }]
      },
      options: {
        responsive: false,
        cutout: '62%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              color: '#475569',
              font: { size: 12 }
            }
          },
          tooltip: {
            callbacks: {
              label: (item) => item.label + ': ' + item.raw + '%'
            }
          }
        }
      }
    });
  </script>
</body>
</html>
