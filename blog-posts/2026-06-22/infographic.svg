<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#FAFAF9"/>

  <text x="600" y="56" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#0F172A">Build for the Room, Not the Visitor Who Clicked First</text>
  <text x="600" y="86" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#64748B">What each role on the buying committee needs before they ask for it</text>

  <!-- four role cards -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

    <!-- Security -->
    <rect x="60" y="140" width="250" height="270" rx="10" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="60" y="140" width="250" height="6" rx="3" fill="#DC2626"/>
    <text x="185" y="185" text-anchor="middle" font-size="17" font-weight="600" fill="#0F172A">Security</text>
    <text x="185" y="208" text-anchor="middle" font-size="12" fill="#94A3B8">Arrives late. Carries veto power.</text>
    <text x="90" y="245" font-size="13" fill="#475569">Needs:</text>
    <text x="90" y="270" font-size="13" fill="#475569">A security brief that</text>
    <text x="90" y="291" font-size="13" fill="#475569">answers compliance and</text>
    <text x="90" y="312" font-size="13" fill="#475569">data-handling questions</text>
    <text x="90" y="333" font-size="13" fill="#475569">before they're asked</text>

    <!-- Procurement -->
    <rect x="335" y="140" width="250" height="270" rx="10" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="335" y="140" width="250" height="6" rx="3" fill="#DC2626"/>
    <text x="460" y="185" text-anchor="middle" font-size="17" font-weight="600" fill="#0F172A">Procurement</text>
    <text x="460" y="208" text-anchor="middle" font-size="12" fill="#94A3B8">Joins around week six.</text>
    <text x="365" y="245" font-size="13" fill="#475569">Needs:</text>
    <text x="365" y="270" font-size="13" fill="#475569">A checklist covering terms,</text>
    <text x="365" y="291" font-size="13" fill="#475569">renewal risk, and contract</text>
    <text x="365" y="312" font-size="13" fill="#475569">basics that exists before</text>
    <text x="365" y="333" font-size="13" fill="#475569">they ever join the deal</text>

    <!-- Finance -->
    <rect x="610" y="140" width="250" height="270" rx="10" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="610" y="140" width="250" height="6" rx="3" fill="#DC2626"/>
    <text x="735" y="185" text-anchor="middle" font-size="17" font-weight="600" fill="#0F172A">Finance</text>
    <text x="735" y="208" text-anchor="middle" font-size="12" fill="#94A3B8">Never opens the product.</text>
    <text x="640" y="245" font-size="13" fill="#475569">Needs:</text>
    <text x="640" y="270" font-size="13" fill="#475569">A one-page total cost</text>
    <text x="640" y="291" font-size="13" fill="#475569">breakdown that answers</text>
    <text x="640" y="312" font-size="13" fill="#475569">renewal-risk questions</text>
    <text x="640" y="333" font-size="13" fill="#475569">without needing a call</text>

    <!-- End users -->
    <rect x="885" y="140" width="250" height="270" rx="10" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="885" y="140" width="250" height="6" rx="3" fill="#DC2626"/>
    <text x="1010" y="185" text-anchor="middle" font-size="17" font-weight="600" fill="#0F172A">End Users</text>
    <text x="1010" y="208" text-anchor="middle" font-size="12" fill="#94A3B8">Live with the tool daily.</text>
    <text x="915" y="245" font-size="13" fill="#475569">Needs:</text>
    <text x="915" y="270" font-size="13" fill="#475569">Workflow-fit answers,</text>
    <text x="915" y="291" font-size="13" fill="#475569">not feature lists, since</text>
    <text x="915" y="312" font-size="13" fill="#475569">they were never in the</text>
    <text x="915" y="333" font-size="13" fill="#475569">room when the trial began</text>
  </g>

  <!-- connecting line from a single "champion" node down to all four -->
  <circle cx="600" cy="460" r="20" fill="#0F172A"/>
  <text x="600" y="465" text-anchor="middle" font-size="11" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Champion</text>

  <g stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,4">
    <line x1="185" y1="410" x2="585" y2="450"/>
    <line x1="460" y1="410" x2="595" y2="442"/>
    <line x1="735" y1="410" x2="605" y2="442"/>
    <line x1="1010" y1="410" x2="615" y2="450"/>
  </g>

  <text x="600" y="520" text-anchor="middle" font-size="14" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">One champion cannot answer four functions alone.</text>
  <text x="600" y="544" text-anchor="middle" font-size="14" fill="#475569" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Pre-built content lets them hand off the answer instead of going to find it.</text>

  <text x="600" y="610" text-anchor="middle" font-size="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">A document that exists on day one turns a three-day scramble into a same-day answer.</text>
</svg>
