<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The AI Ad Spend Readiness Gap</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    margin: 0;
    padding: 32px;
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }
  .chart-wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  h2 {
    color: #0F172A;
    font-size: 20px;
    margin: 0 0 4px 0;
    text-align: center;
  }
  p.sub {
    color: #64748B;
    font-size: 13px;
    margin: 0 0 24px 0;
    text-align: center;
  }
  canvas {
    max-height: 420px;
  }
  p.source {
    color: #94A3B8;
    font-size: 11px;
    text-align: center;
    margin-top: 18px;
  }
</style>
</head>
<body>
<div class="chart-wrap">
  <h2>The AI Ad Spend Readiness Gap</h2>
  <p class="sub">Three separate 2025-2026 surveys, one consistent gap between AI ad budget and AI ad confidence</p>
  <canvas id="gapChart"></canvas>
  <p class="source">Sources: Gartner 2026 CMO Spend Survey (May 2026); Forrester 2026 Technology &amp; Security Predictions (Oct 2025)</p>
</div>
<script>
const ctx = document.getElementById('gapChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: [
      'Share of marketing budget CMOs allocate to AI',
      'CMOs who say their org is ready to scale AI',
      'Planned enterprise AI spend being deferred to 2027'
    ],
    datasets: [{
      data: [15.3, 30, 25],
      backgroundColor: ['#0F172A', '#94A3B8', '#DC2626'],
      borderRadius: 4,
      barThickness: 38
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (item) => item.formattedValue + '%'
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        max: 40,
        ticks: { callback: (v) => v + '%', color: '#475569' },
        grid: { color: '#E2E8F0' }
      },
      y: {
        ticks: { color: '#0F172A', font: { size: 12.5 } },
        grid: { display: false }
      }
    }
  }
});
</script>
</body>
</html>
