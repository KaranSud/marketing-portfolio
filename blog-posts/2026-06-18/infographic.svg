<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <rect x="0" y="0" width="900" height="700" fill="#FAFAF9"/>

  <text x="450" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0F172A">The Optimization Loop AI Ad Buying Can't See</text>
  <text x="450" y="70" text-anchor="middle" font-size="13" fill="#64748B">Five steps, and only one of them has a human in it</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- connecting arrows drawn first so nodes sit on top -->
  <path d="M450,150 C530,170 620,210 660,255" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M650,320 C630,380 610,440 600,480" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540,545 C480,560 420,560 360,545" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300,480 C280,440 260,380 245,320" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- the reinforcing loop, drawn distinctly in accent color, arcing back outside the pentagon -->
  <path d="M220,255 C120,200 130,110 280,95 C350,86 410,95 450,108" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowRed)"/>
  <text x="195" y="170" font-size="12" fill="#DC2626" font-weight="600">no human sees this loop close</text>

  <!-- Node 1: top, human input -->
  <g>
    <rect x="350" y="100" width="200" height="92" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="2"/>
    <text x="450" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">1. Marketer sets the goal</text>
    <text x="450" y="152" text-anchor="middle" font-size="12" fill="#475569">"Lower the cost per</text>
    <text x="450" y="168" text-anchor="middle" font-size="12" fill="#475569">conversion this quarter"</text>
  </g>

  <!-- Node 2: right, AI engine -->
  <g>
    <rect x="568" y="218" width="200" height="92" rx="10" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
    <text x="668" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">2. AI bidding engine</text>
    <text x="668" y="266" text-anchor="middle" font-size="12" fill="#475569">optimizes in real time,</text>
    <text x="668" y="282" text-anchor="middle" font-size="12" fill="#475569">thousands of bids a minute</text>
  </g>

  <!-- Node 3: bottom right, alarm -->
  <g>
    <rect x="486" y="482" width="220" height="96" rx="10" fill="#FFFFFF" stroke="#DC2626" stroke-width="2.5"/>
    <text x="596" y="512" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">3. Bid lands on AI-built inventory</text>
    <text x="596" y="532" text-anchor="middle" font-size="12" fill="#475569">domains generated by AI,</text>
    <text x="596" y="548" text-anchor="middle" font-size="12" fill="#475569">never built for an audience</text>
  </g>

  <!-- Node 4: bottom left, alarm -->
  <g>
    <rect x="194" y="482" width="220" height="96" rx="10" fill="#FFFFFF" stroke="#DC2626" stroke-width="2.5"/>
    <text x="304" y="512" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">4. Bot traffic mimics a click</text>
    <text x="304" y="532" text-anchor="middle" font-size="12" fill="#475569">engagement patterns close</text>
    <text x="304" y="548" text-anchor="middle" font-size="12" fill="#475569">enough to pass as real</text>
  </g>

  <!-- Node 5: left, AI engine reinforcement -->
  <g>
    <rect x="132" y="218" width="200" height="92" rx="10" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
    <text x="232" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#0F172A">5. Engine reinforces it</text>
    <text x="232" y="266" text-anchor="middle" font-size="12" fill="#475569">reads the fake signal as</text>
    <text x="232" y="282" text-anchor="middle" font-size="12" fill="#475569">success, bids more there</text>
  </g>

  <text x="450" y="650" text-anchor="middle" font-size="13" fill="#64748B">The dashboard reports a falling cost per conversion the entire time.</text>
  <text x="450" y="672" text-anchor="middle" font-size="13" fill="#0F172A" font-weight="600">It is optimizing toward the wrong thing efficiently.</text>
</svg>
