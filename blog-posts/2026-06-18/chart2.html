<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Where $1,000 in Programmatic Spend Actually Goes</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    margin: 0;
    padding: 32px;
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }
  .chart-wrap {
    max-width: 640px;
    margin: 0 auto;
  }
  h2 {
    color: #0F172A;
    font-size: 19px;
    margin: 0 0 4px 0;
  }
  p.sub {
    color: #64748B;
    font-size: 13px;
    margin: 0 0 20px 0;
  }
  .source {
    color: #94A3B8;
    font-size: 11px;
    margin-top: 18px;
  }
</style>
</head>
<body>
<div class="chart-wrap">
  <h2>Where $1,000 in Programmatic Spend Actually Goes</h2>
  <p class="sub">ANA Q2 2025 Programmatic Transparency Benchmark</p>
  <canvas id="bars" height="280"></canvas>
  <p class="source">Source: Association of National Advertisers (ANA), ana.net</p>
</div>
<script>
new Chart(document.getElementById('bars'), {
  type: 'bar',
  data: {
    labels: ['Reaches consumers as a viewable impression', 'Lost in the supply chain before it arrives'],
    datasets: [{
      data: [43.9, 56.1],
      backgroundColor: ['#0F172A', '#DC2626'],
      borderRadius: 6,
      barThickness: 90
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => ctx.raw + '% of every $1,000 spent'
        }
      }
    },
    scales: {
      y: {
        min: 0,
        max: 70,
        ticks: { color: '#475569', callback: (v) => v + '%' },
        grid: { color: '#E2E8F0' }
      },
      x: {
        ticks: { color: '#0F172A', font: { size: 12 } },
        grid: { display: false }
      }
    }
  }
});
</script>
</body>
</html>
